server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # 静态资源长期缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # /arcade/ 由外层 nginx (docs/nginx-games.magies.top.conf) 代理到各游戏服务，
    # 不应落到本容器的 SPA fallback，否则 ArcadeView 的 iframe 会加载到自身导致递归嵌套
    location /arcade/ {
        return 404;
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
