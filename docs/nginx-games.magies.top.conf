# games.magies.top — MagiesGames 主站 Nginx 配置
# 部署路径：/etc/nginx/sites-available/games.magies.top

server {
    listen 80;
    server_name games.magies.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name games.magies.top;

    ssl_certificate     /etc/ssl/cloudflare/magies.top.crt;
    ssl_certificate_key /etc/ssl/cloudflare/magies.top.key;

    # ── MagiesGames 后端 API ──────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8102;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── MagiesGames WebSocket ─────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:8102;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── 街机游戏：疯狂碰碰车 (3001) ───────────────
    location /arcade/bumper-cars/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 街机游戏：霓虹竞技场 FPS (3002) ───────────
    location /arcade/neon-fps/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 街机游戏：敲冰块大逃杀 (3003) ─────────────
    location /arcade/ice-climber/ {
        proxy_pass http://127.0.0.1:3003/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 街机游戏：2D卡通大乱斗 (3004) ─────────────
    location /arcade/arena-brawl/ {
        proxy_pass http://127.0.0.1:3004/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 街机游戏：Q版炸弹人 (3005) ────────────────
    location /arcade/bomb-party/ {
        proxy_pass http://127.0.0.1:3005/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── MagiesGames 前端 (Docker 容器 8101) ───────
    location /assets/ {
        proxy_pass http://127.0.0.1:8101;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:8101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
